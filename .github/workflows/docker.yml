name: Docker

on:
  push:
    branches: [main]
    tags: [v*]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type == 'branch' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check Docker Hub credentials
        id: check-dh
        env:
          USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: |
          if [ -n "$USERNAME" ] && [ -n "$PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/login-action@v4
        if: steps.check-dh.outputs.available == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/metadata-action@v6
        id: meta-ghcr
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=short,event=branch
            type=semver,pattern={{version}},event=tag
            type=semver,pattern={{major}}.{{minor}},event=tag
            type=raw,value=latest,event=tag

      - uses: docker/metadata-action@v6
        id: meta-dh
        if: steps.check-dh.outputs.available == 'true'
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/ytdlp-http-wrapper
          tags: |
            type=sha,format=short,event=branch
            type=semver,pattern={{version}},event=tag
            type=semver,pattern={{major}}.{{minor}},event=tag
            type=raw,value=latest,event=tag

      - uses: docker/build-push-action@v7
        id: build-ghcr
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=gha,scope=ytdlp-http
          cache-to: type=gha,scope=ytdlp-http,mode=max

      - uses: docker/build-push-action@v7
        if: steps.check-dh.outputs.available == 'true'
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-dh.outputs.tags }}
          labels: ${{ steps.meta-dh.outputs.labels }}
          cache-from: type=gha,scope=ytdlp-http
          cache-to: type=gha,scope=ytdlp-http,mode=max
